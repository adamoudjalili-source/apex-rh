<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX RH — Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0F0F23;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tips {
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      max-width: 320px;
      text-align: left;
    }
    .tips ul { margin-top: 0.5rem; padding-left: 1rem; }
    .tips li { margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Hors ligne</h1>
  <p>
    Vous n'êtes pas connecté à Internet. Reconnectez-vous pour accéder à APEX RH.
  </p>
  <button onclick="location.reload()">Réessayer</button>

  <div class="tips">
    <strong style="color:rgba(255,255,255,0.6)">Dernières pages visitées</strong>
    <ul>
      <li>Votre tableau de bord</li>
      <li>Vos tâches en cours</li>
      <li>Votre journal PULSE</li>
    </ul>
    <p style="margin-top:0.5rem">seront disponibles dès la reconnexion.</p>
  </div>
</body>
</html>
